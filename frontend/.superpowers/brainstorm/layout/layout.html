<h2>导航布局方案</h2>
<p class="subtitle">选择顶部导航的样式</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>简洁水平导航</h3>
      <p>顶部一条横栏，左侧Logo，右侧四个导航项，平铺式</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>侧边栏导航</h3>
      <p>左侧垂直导航栏，图标+文字，顶部留空，可折叠</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>顶部大导航</h3>
      <p>带背景色的顶部横栏，Logo居中，导航项均匀分布</p>
    </div>
  </div>
</div>
