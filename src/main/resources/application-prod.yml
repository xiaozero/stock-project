#mybatis plus 设置
mybatis-plus:
  mapper-locations: classpath*:com/xiao/stockproject/**/xml/*Mapper.xml
  global-config:
    # 关闭MP3.0自带的banner
    banner: false
    db-config:
      #主键类型
      id-type: ASSIGN_ID
      # 默认数据库表下划线命名
      table-underline: true
  configuration:
    # 这个配置会将执行的sql打印出来，在开发或测试的时候可以用
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 返回类型为Map,显示null对应的字段
    call-setters-on-nulls: true
#Mybatis输出sql日志
logging:
  level:
    org.jeecg.modules.system.mapper : info
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
    operationsSorter: method

# Stock analysis configuration
stock:
  analysis:
    python-path: python
    script-path: scripts/stock_analysis.py